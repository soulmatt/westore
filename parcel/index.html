<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>택배비 정산 - WeStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .drop-zone {
      border: 2px dashed #adb5bd;
      border-radius: 0.5rem;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #0d6efd; }
    .drop-zone.has-file { border-color: #198754; background-color: #f6fff8; }
  </style>
</head>
<body>

<div class="container py-4" style="max-width:860px">

  <div class="mb-3">
    <a href="../" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i> WeStore 메인으로
    </a>
  </div>

  <h1 class="h3 mb-1">택배비 정산</h1>
  <p class="text-muted mb-4">Excel 파일을 분석해 발송처별 택배비를 정산하세요.</p>

  <div id="message" class="d-none alert mb-3"></div>

  <!-- 파일 업로드 -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" class="d-none" accept=".xlsx,.xls">
    <div class="fs-1 mb-2">📁</div>
    <p class="text-muted mb-0" id="dropZoneText">파일을 선택하거나 드래그하세요 (.xlsx, .xls)</p>
  </div>

  <!-- 파일 선택 후 -->
  <div id="afterFileSection" class="d-none">
    <hr class="my-4">
    <h5 class="mb-3">담당자별 발송처 매핑</h5>
    <div id="personMappingList" class="mb-3"></div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm" onclick="addPersonMapping()">담당자 추가</button>
      <button class="btn btn-primary btn-sm" id="processBtn" onclick="processFile()">파일 처리하기</button>
    </div>
  </div>

  <!-- 결과 -->
  <div id="resultsSection" class="d-none mt-4">
    <hr class="my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">정산 결과</h5>
      <button id="saveImageBtn" class="btn btn-outline-secondary btn-sm" onclick="saveAsImage()">
        <i class="bi bi-image"></i> 이미지로 저장
      </button>
    </div>
    <ul class="nav nav-pills mb-3" id="resultTabs">
      <li class="nav-item">
        <a class="nav-link active" href="#" data-tab="personal" onclick="switchTab('personal');return false;">정산</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" data-tab="ranking" onclick="switchTab('ranking');return false;">순위 테이블</a>
      </li>
    </ul>
    <div id="tab-personal"></div>
    <div id="tab-ranking" class="d-none"></div>
  </div>

  <div class="text-center mt-5 mb-4">
    <p class="text-muted small mb-0">데이터는 브라우저에서만 처리되며 외부로 전송되지 않습니다.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const personMappingData = {
  정대원: ['몽이네잡화*', '디라운드주식회*'],
  백광민: ['레알프렌*', '타임즈스토*', '레알프렌즈*', '소소상*'],
  이호성: ['꼬마네잡화*', '하이*'],
  서진희: ['스쿠티스튜디*', '스큐티스튜디*'],
  한동연: ['베리굿초이*'],
};

let currentFile = null;
let currentResults = null;

function showMessage(text, type) {
  const el = document.getElementById('message');
  el.className = `alert alert-${type === 'error' ? 'danger' : type} mb-3`;
  el.textContent = text;
  el.classList.remove('d-none');
  setTimeout(() => el.classList.add('d-none'), 3000);
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmt(n) { return Number(n).toLocaleString(); }

function handleFile(file) {
  if (!file.name.match(/\.(xlsx|xls)$/i)) {
    showMessage('Excel 파일(.xlsx, .xls)만 업로드 가능합니다.', 'error');
    return;
  }
  currentFile = file;
  currentResults = null;
  const dropZone = document.getElementById('dropZone');
  dropZone.classList.add('has-file');
  document.getElementById('dropZoneText').textContent = `파일: ${file.name}`;
  document.getElementById('afterFileSection').classList.remove('d-none');
  document.getElementById('resultsSection').classList.add('d-none');
  renderPersonMappingList();
  showMessage(`파일 "${file.name}"이 업로드되었습니다.`, 'success');
}

function renderPersonMappingList() {
  const container = document.getElementById('personMappingList');
  container.innerHTML = Object.keys(personMappingData).map(person => `
    <div class="d-flex gap-2 align-items-center mb-2">
      <input type="text" class="form-control form-control-sm" style="width:110px"
        value="${escapeHtml(person)}"
        onblur="updatePersonName(this, '${escapeHtml(person)}')">
      <input type="text" class="form-control form-control-sm flex-grow-1"
        value="${escapeHtml(personMappingData[person].join(', '))}"
        placeholder="발송처명을 쉼표로 구분"
        oninput="updatePersonStores('${escapeHtml(person)}', this.value)">
      <button class="btn btn-outline-danger btn-sm flex-shrink-0" style="white-space:nowrap" onclick="removePersonMapping('${escapeHtml(person)}')">삭제</button>
    </div>`).join('');
}

function addPersonMapping() {
  const person = prompt('담당자 이름을 입력하세요:');
  if (person && person.trim()) {
    personMappingData[person.trim()] = [];
    renderPersonMappingList();
  }
}

function updatePersonName(inputEl, oldName) {
  const newName = inputEl.value.trim();
  if (newName && newName !== oldName && !personMappingData[newName]) {
    personMappingData[newName] = personMappingData[oldName];
    delete personMappingData[oldName];
    renderPersonMappingList();
  }
}

function updatePersonStores(person, storesStr) {
  personMappingData[person] = storesStr.split(',').map(s => s.trim()).filter(Boolean);
}

function removePersonMapping(person) {
  if (confirm(`"${person}" 담당자를 삭제하시겠습니까?`)) {
    delete personMappingData[person];
    renderPersonMappingList();
  }
}

function readExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try { resolve(XLSX.read(new Uint8Array(e.target.result), { type: 'array' })); }
      catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function processRankingTable(data) {
  if (!data.length) throw new Error('첫 번째 시트에 데이터가 없습니다.');
  const columns = Object.keys(data[0]);
  const amountColumn = columns.find(col =>
    col.includes('금액') || col.includes('가격') || col.includes('결제') ||
    col.includes('최종') || col.includes('총') || col.includes('합계')
  );
  if (!amountColumn) throw new Error(`금액 컬럼을 찾을 수 없습니다. 사용 가능한 컬럼: ${columns.join(', ')}`);

  const sortedData = data
    .filter(row => row[amountColumn] && !isNaN(parseFloat(String(row[amountColumn]))))
    .sort((a, b) => parseFloat(String(b[amountColumn] || 0)) - parseFloat(String(a[amountColumn] || 0)));

  const targetPattern = /디라운드.*주식회.*/;
  let targetRank = 0, targetFound = false;
  for (let i = 0; i < sortedData.length; i++) {
    if (targetPattern.test(Object.values(sortedData[i]).join(' '))) {
      targetRank = i + 1;
      targetFound = sortedData[i];
      break;
    }
  }

  return {
    data: sortedData.slice(0, Math.max(targetRank, 10)),
    targetRank, targetFound, amountColumn, allColumns: columns,
  };
}

function processPersonalTable(data) {
  if (!data.length) throw new Error('두 번째 시트에 데이터가 없습니다.');
  const columns = Object.keys(data[0]);
  const senderMajorCol = columns.find(col => col.includes('송하인') && col.includes('대분류'));
  const senderMinorCol = columns.find(col => col.includes('송하인') && col.includes('소분류'));
  const amountCol = columns.find(col => col.includes('금액') || col.includes('가격') || col.includes('결제'));
  if (!senderMajorCol || !senderMinorCol || !amountCol) throw new Error('필요한 컬럼을 찾을 수 없습니다.');

  const digroundPattern = /디라운드.*주식회.*/;
  const filteredData = data.filter(row => row[senderMajorCol] && digroundPattern.test(String(row[senderMajorCol])));
  const classCol = columns.find(col =>
    filteredData.some(r => { const v = String(r[col] || '').trim(); return v === '반품' || v === '일반'; })
  );

  const summary = {}, quantitySummary = {}, returnQuantitySummary = {};
  filteredData.forEach(row => {
    const sender = String(row[senderMinorCol] || '').trim();
    const amount = parseFloat(String(row[amountCol] || 0));
    const isReturn = classCol ? String(row[classCol] || '').trim() === '반품' : false;
    if (!sender) return;
    if (amount > 0) summary[sender] = (summary[sender] || 0) + amount;
    quantitySummary[sender] = (quantitySummary[sender] || 0) + 1;
    if (isReturn) returnQuantitySummary[sender] = (returnQuantitySummary[sender] || 0) + 1;
  });

  const matchedStoreSet = new Set();
  const personalData = Object.keys(personMappingData).flatMap(person => {
    let totalAmount = 0, totalQuantity = 0, totalReturnQuantity = 0;
    const matchedStores = [];
    const personMatchedStores = new Set();

    personMappingData[person].forEach(store => {
      const storeClean = store.trim();
      const hasWildcardEnd = storeClean.endsWith('*');
      const hasWildcardStart = storeClean.startsWith('*');
      const storePattern = storeClean.replace(/\*/g, '').replace(/\s+/g, '').toLowerCase();

      Object.keys(summary).forEach(sender => {
        if (personMatchedStores.has(sender)) return;
        const senderNoSpace = sender.replace(/\s+/g, '').toLowerCase();
        const isMatch =
          (hasWildcardStart && hasWildcardEnd) ? senderNoSpace.includes(storePattern) :
          hasWildcardEnd ? senderNoSpace.startsWith(storePattern) :
          hasWildcardStart ? senderNoSpace.endsWith(storePattern) :
          senderNoSpace === storePattern;
        if (isMatch) {
          totalAmount += summary[sender];
          totalQuantity += quantitySummary[sender];
          totalReturnQuantity += returnQuantitySummary[sender] || 0;
          matchedStores.push(sender);
          personMatchedStores.add(sender);
          matchedStoreSet.add(sender);
        }
      });
    });

    return totalAmount > 0
      ? [{ person, stores: matchedStores.join(', '), quantity: totalQuantity, returnQuantity: totalReturnQuantity, amount: totalAmount }]
      : [];
  }).sort((a, b) => b.amount - a.amount);

  const unmatchedStores = Object.keys(summary)
    .filter(sender => !matchedStoreSet.has(sender))
    .map(sender => ({ store: sender, quantity: quantitySummary[sender], returnQuantity: returnQuantitySummary[sender] || 0, amount: summary[sender] }))
    .sort((a, b) => b.amount - a.amount);

  return { personalData, unmatchedStores };
}

function processCompanyTable(data) {
  if (!data.length) throw new Error('두 번째 시트에 데이터가 없습니다.');
  const columns = Object.keys(data[0]);
  const senderMajorCol = columns.find(col => col.includes('송하인') && col.includes('대분류'));
  const senderMinorCol = columns.find(col => col.includes('송하인') && col.includes('소분류'));
  const amountCol = columns.find(col => col.includes('금액') || col.includes('가격') || col.includes('결제'));
  if (!senderMajorCol || !senderMinorCol || !amountCol) throw new Error('필요한 컬럼을 찾을 수 없습니다.');

  const digroundPattern = /디라운드.*주식회.*/;
  const filteredData = data.filter(row => row[senderMajorCol] && digroundPattern.test(String(row[senderMajorCol])));
  const classCol = columns.find(col =>
    filteredData.some(r => { const v = String(r[col] || '').trim(); return v === '반품' || v === '일반'; })
  );

  const companySummary = {}, companyQuantitySummary = {}, companyReturnSummary = {};
  filteredData.forEach(row => {
    const company = String(row[senderMinorCol] || '').trim();
    const amount = parseFloat(String(row[amountCol] || 0));
    const isReturn = classCol ? String(row[classCol] || '').trim() === '반품' : false;
    if (!company) return;
    if (amount > 0) companySummary[company] = (companySummary[company] || 0) + amount;
    companyQuantitySummary[company] = (companyQuantitySummary[company] || 0) + 1;
    if (isReturn) companyReturnSummary[company] = (companyReturnSummary[company] || 0) + 1;
  });

  const companyData = Object.keys(companySummary)
    .map(company => ({
      company,
      quantity: companyQuantitySummary[company],
      returnQuantity: companyReturnSummary[company] || 0,
      amount: companySummary[company],
    }))
    .sort((a, b) => b.amount - a.amount);

  return { companyData };
}

async function processFile() {
  if (!currentFile) { showMessage('처리할 파일이 없습니다.', 'error'); return; }
  const btn = document.getElementById('processBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span>처리 중...';

  try {
    const workbook = await readExcelFile(currentFile);
    if (workbook.SheetNames.length < 2) throw new Error('최소 2개의 시트가 필요합니다.');

    const sheet1Data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    const sheet2Data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[1]]);

    currentResults = {
      success: true,
      ranking: processRankingTable(sheet1Data),
      personal: processPersonalTable(sheet2Data),
      company: processCompanyTable(sheet2Data),
    };
    renderResults();
  } catch (err) {
    showMessage('파일 처리 중 오류: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '파일 처리하기';
  }
}

function switchTab(tab) {
  ['personal', 'ranking'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('d-none', t !== tab);
  });
  document.querySelectorAll('#resultTabs .nav-link').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
}

function renderResults() {
  renderPersonalTab();
  renderRankingTab();
  document.getElementById('resultsSection').classList.remove('d-none');
  switchTab('personal');
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
}

function renderPersonalTab() {
  const r = currentResults;
  const u = r.personal.unmatchedStores;
  let html = '';

  if (u.length > 0) {
    const uQ = u.reduce((s, i) => s + i.quantity, 0);
    const uR = u.reduce((s, i) => s + i.returnQuantity, 0);
    const uA = u.reduce((s, i) => s + i.amount, 0);
    html += `
      <div class="alert alert-warning">
        <strong>⚠️ 담당자에게 매칭되지 않은 발송처 ${u.length}곳</strong><br>
        출고 ${fmt(uQ - uR)}건, 반품 ${fmt(uR)}건, 총 ${fmt(uQ)}건, ${fmt(uA)}원
        <details class="mt-2">
          <summary style="cursor:pointer">누락된 발송처 목록</summary>
          <div class="table-responsive mt-2">
            <table class="table table-sm table-striped mb-0">
              <thead><tr><th>발송처명</th><th class="text-end">출고</th><th class="text-end">반품</th><th class="text-end">총수량</th><th class="text-end">금액</th></tr></thead>
              <tbody>
                ${u.map(item => `<tr>
                  <td>${escapeHtml(item.store)}</td>
                  <td class="text-end">${fmt(item.quantity - item.returnQuantity)}</td>
                  <td class="text-end">${fmt(item.returnQuantity)}</td>
                  <td class="text-end">${fmt(item.quantity)}</td>
                  <td class="text-end">${fmt(item.amount)}원</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </details>
      </div>`;
  }

  const p = r.personal.personalData;
  const pQ = p.reduce((s, i) => s + i.quantity, 0);
  const pR = p.reduce((s, i) => s + i.returnQuantity, 0);
  const pA = p.reduce((s, i) => s + i.amount, 0);
  html += `
    <h6 class="fw-semibold mb-2">담당자로 정산</h6>
    <div class="table-responsive">
      <table class="table table-sm table-striped">
        <thead><tr><th>담당자</th><th>발송처</th><th class="text-end">출고</th><th class="text-end">반품</th><th class="text-end">총수량</th><th class="text-end">금액</th></tr></thead>
        <tbody>
          ${p.map(item => `<tr>
            <td>${escapeHtml(item.person)}</td>
            <td class="small text-muted">${escapeHtml(item.stores)}</td>
            <td class="text-end">${fmt(item.quantity - item.returnQuantity)}</td>
            <td class="text-end">${fmt(item.returnQuantity)}</td>
            <td class="text-end">${fmt(item.quantity)}</td>
            <td class="text-end">${fmt(item.amount)}원</td>
          </tr>`).join('')}
          <tr class="table-primary fw-bold">
            <td>총합</td><td>전체</td>
            <td class="text-end">${fmt(pQ - pR)}</td>
            <td class="text-end">${fmt(pR)}</td>
            <td class="text-end">${fmt(pQ)}</td>
            <td class="text-end">${fmt(pA)}원</td>
          </tr>
        </tbody>
      </table>
    </div>`;

  if (r.company) {
    const c = r.company.companyData;
    const cQ = c.reduce((s, i) => s + i.quantity, 0);
    const cR = c.reduce((s, i) => s + i.returnQuantity, 0);
    const cA = c.reduce((s, i) => s + i.amount, 0);
    html += `
      <div class="mt-4">
        <h6 class="fw-semibold mb-1">발송처로 정산</h6>
        <p class="text-muted small mb-2">디라운드 대분류 소속 발송처별 택배 요금 집계 (총 ${c.length}개 업체)</p>
        <div class="table-responsive">
          <table class="table table-sm table-striped">
            <thead><tr><th>순위</th><th>발송처명</th><th class="text-end">출고</th><th class="text-end">반품</th><th class="text-end">총수량</th><th class="text-end">금액</th><th class="text-end">평균 단가</th></tr></thead>
            <tbody>
              ${c.map((item, i) => `<tr>
                <td>${i + 1}</td>
                <td>${escapeHtml(item.company)}</td>
                <td class="text-end">${fmt(item.quantity - item.returnQuantity)}</td>
                <td class="text-end">${fmt(item.returnQuantity)}</td>
                <td class="text-end">${fmt(item.quantity)}</td>
                <td class="text-end">${fmt(item.amount)}원</td>
                <td class="text-end">${item.quantity > 0 ? fmt(Math.round(item.amount / item.quantity)) : 0}원</td>
              </tr>`).join('')}
              <tr class="table-info fw-bold">
                <td>-</td><td>전체 합계</td>
                <td class="text-end">${fmt(cQ - cR)}</td>
                <td class="text-end">${fmt(cR)}</td>
                <td class="text-end">${fmt(cQ)}</td>
                <td class="text-end">${fmt(cA)}원</td>
                <td class="text-end">${cQ > 0 ? fmt(Math.round(cA / cQ)) : 0}원</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>`;
  }

  document.getElementById('tab-personal').innerHTML = html;
}

function renderRankingTab() {
  const rk = currentResults.ranking;
  const displayCols = ['업체명', '일반', '반품', '계'].filter(col => rk.allColumns.some(c => c.includes(col)));

  const html = `
    ${rk.targetFound
      ? `<div class="alert alert-success">디라운드 주식회 관련 업체가 ${rk.targetRank}위에 있습니다!</div>`
      : `<div class="alert alert-danger">디라운드 주식회 패턴을 찾을 수 없습니다.</div>`}
    <div class="table-responsive">
      <table class="table table-sm table-striped">
        <thead>
          <tr>
            <th>순위</th>
            ${displayCols.map(col => `<th>${escapeHtml(col)}</th>`).join('')}
            <th class="text-end">${escapeHtml(rk.amountColumn)}</th>
          </tr>
        </thead>
        <tbody>
          ${rk.data.map((row, i) => {
            const isTarget = i + 1 === rk.targetRank;
            const cells = displayCols.map(col => {
              const actualCol = rk.allColumns.find(c => c.includes(col));
              const value = actualCol ? row[actualCol] : '';
              return `<td>${typeof value === 'number' ? fmt(value) : escapeHtml(String(value || ''))}</td>`;
            }).join('');
            return `<tr class="${isTarget ? 'table-info fw-bold' : ''}">
              <td>${i + 1}</td>${cells}
              <td class="text-end">${fmt(parseFloat(String(row[rk.amountColumn] || 0)))}원</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  document.getElementById('tab-ranking').innerHTML = html;
}

async function saveAsImage() {
  if (!currentResults) { showMessage('정산 결과가 없습니다.', 'error'); return; }
  const btn = document.getElementById('saveImageBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span>저장 중...';

  try {
    const el = document.getElementById('tab-personal');

    // 여백용 래퍼에 클론 삽입 후 캡처
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;background:#fff;padding:32px;width:' + el.offsetWidth + 'px;box-sizing:content-box';
    const clone = el.cloneNode(true);
    clone.querySelectorAll('.table-responsive').forEach(d => { d.style.overflow = 'visible'; });
    wrapper.appendChild(clone);
    document.body.appendChild(wrapper);

    const canvas = await html2canvas(wrapper, {
      backgroundColor: '#ffffff',
      scale: 2,
      useCORS: true,
    });

    document.body.removeChild(wrapper);

    const link = document.createElement('a');
    link.download = `택배비정산_${new Date().toISOString().slice(0, 10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    showMessage('이미지 저장 실패: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-image"></i> 이미지로 저장';
  }
}

// 드래그 앤 드롭
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files?.[0]) handleFile(e.target.files[0]);
});
</script>
