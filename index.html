<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>WeStore - 통합 배송 관리</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Dropzone CSS -->
  <link rel="stylesheet" href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css">
  <!-- Custom CSS -->
  <link href="css/app.css" rel="stylesheet">
</head>
<body>

<div class="container py-3">

  <!-- 발송처 정보 카드 -->
  <div class="card seller-card mb-4">
    <div class="card-body">
      <h5 class="card-title mb-3"><i class="bi bi-truck"></i> 발송처 정보</h5>
      <div class="row g-3 align-items-center mb-2">
        <div class="col-1">
          <label for="senderName" class="col-form-label col-form-label-sm">발송처명</label>
        </div>
        <div class="col">
          <input type="text" class="form-control form-control-sm" id="senderName" placeholder="발송처명 입력">
        </div>
        <div class="col-auto">
          <small class="form-text text-danger d-none" id="senderNameError">발송처명을 입력해 주세요!</small>
        </div>
      </div>
      <div class="row g-3 align-items-center mb-2">
        <div class="col-1">
          <label for="storeTelephone" class="col-form-label col-form-label-sm">전화번호</label>
        </div>
        <div class="col">
          <input type="text" class="form-control form-control-sm" id="storeTelephone" placeholder="010-0000-0000">
        </div>
        <div class="col-auto">
          <small class="form-text text-danger d-none" id="storeTelephoneError">전화번호를 입력해 주세요!</small>
        </div>
      </div>
      <div class="row g-3 align-items-center mb-2">
        <div class="col-1">
          <label for="storeAddress" class="col-form-label col-form-label-sm">주소</label>
        </div>
        <div class="col">
          <input type="text" class="form-control form-control-sm" id="storeAddress" placeholder="발송처 주소 입력">
        </div>
        <div class="col-auto">
          <small class="form-text text-danger d-none" id="storeAddressError">주소를 입력해 주세요!</small>
        </div>
      </div>
      <div class="row g-3 align-items-center mb-2">
        <div class="col-1">
          <label for="defaultMessage" class="col-form-label col-form-label-sm">배송메세지</label>
        </div>
        <div class="col">
          <input type="text" class="form-control form-control-sm" id="defaultMessage">
        </div>
        <div class="col-auto">
          <small class="form-text text-muted">배송메세지가 없는 주문에 사용됩니다</small>
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-12 d-flex align-items-end gap-2">
          <button type="button" class="btn btn-success btn-sm" id="btnSave">
            <i class="bi bi-save"></i> <span id="btnSaveText">브라우저에 저장</span>
          </button>
          <button type="button" class="btn btn-outline-danger btn-sm" id="btnClear">
            <i class="bi bi-trash"></i> 브라우저에서 삭제
          </button>
          <button type="button" class="btn btn-outline-primary btn-sm" id="btnCopyUrl">
            <i class="bi bi-link-45deg"></i> 현재 정보로 URL 생성
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 1. 발주서 합치기 -->
  <h5 class="section-header bg-success mb-3">1. 발주서 합치기</h5>

  <div class="status-area mb-2" id="orderStatus"></div>

  <div id="orderDropZone" class="dropzone border border-secondary border-3 text-center py-4 mb-2">
    <div class="dz-message" data-dz-message>
      <span><i class="bi bi-file-earmark-spreadsheet"></i> 각 판매처 발주 파일 올리기 (click or drop)</span>
    </div>
  </div>

  <div class="text-center mb-2">
    <button type="button" class="btn btn-warning" id="downloadJob1Excel">
      <i class="bi bi-download"></i> 1번 파일 다운로드 (택배 양식 파일)
    </button>
  </div>

  <!-- 2. 송장입력 -->
  <h5 class="section-header bg-success mb-3 mt-5">2. 송장입력</h5>

  <div id="invoiceDropZone" class="dropzone border border-secondary border-3 text-center py-4 mb-2">
    <div class="dz-message" data-dz-message>
      <span><i class="bi bi-file-earmark-spreadsheet"></i> 택배프로그램에서 내려받은 송장 파일 올리기 (click or drop)</span>
    </div>
  </div>

  <div class="status-area mb-2" id="invoiceStatus"></div>

  <div class="text-center mb-4">
    <button type="button" class="btn btn-primary" id="downloadJob2Excel">
      <i class="bi bi-download"></i> 2번 파일 다운로드 (엑셀 대량 발송 파일)
    </button>
  </div>

  <!-- 푸터 -->
  <div class="text-center mt-5 mb-4">
    <p class="text-muted small mb-1">업로드한 데이터는 아무데도 전송되지 않고 새로고침 시 삭제됩니다.</p>
    <p class="text-muted small mb-0">v2026-02-23.4</p>
  </div>
</div>


<!-- CDN 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- 앱 엔트리포인트 (ES6 모듈) -->
<script type="module" src="js/app.js"></script>

</body>
</html>
